server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ── SPA fallback ──────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── AUTH (8081) ───────────────────────────────────────────────
  # location /api/comms {
  #   proxy_pass http://vg-ms-comms:8088;
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  # }

  location /api {
    proxy_pass http://vg-ms-auth:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # ── AUTH helper (8081) ─────────────────────────────────────────
  location /api/v1/auth {
    proxy_pass http://vg-ms-auth:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

