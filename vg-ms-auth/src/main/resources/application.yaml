server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: vg-ms-auth

  r2dbc:
    url: ${SPRING_R2DBC_URL}
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}

  sql:
    init:
      mode: ${SQL_INIT_MODE:never}

  webflux:
    multipart:
      max-disk-usage-per-part: 10MB
      max-in-memory-size: 512KB

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend-url: ${APP_FRONTEND_URL}
  upload-dir: ${APP_UPLOAD_DIR:./uploads/perfiles}
  mail:
    from: ${MAIL_FROM}

services:
  academic-url: ${SERVICES_ACADEMIC_URL}
  student-url: ${SERVICES_STUDENT_URL}

logging:
  level:
    org.springframework.r2dbc: DEBUG
    com.vg.auth: DEBUG

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}